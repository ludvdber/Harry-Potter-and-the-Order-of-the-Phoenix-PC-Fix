[MAIN]
FPSLimit = 0                                   // max fps (0: unlimited/off)
FPSLimitMode = 2                               // 1: realtime (thread-lock) | 2: accurate (sleep-yield)
FullScreenRefreshRateInHz = 0                  // overrides refresh rate selected by directx
DisplayFPSCounter = 0                          // displays fps and frametime on screen
ScreenshotKey = 123                            // virtual-key code of the screenshot hotkey (123 = F12, 44 = PrtScr, 0 = off). Saves a PNG of the final frame (post-processing included) to <game>\screenshots\
DPIAware = 1                                   // 1: opt out of Windows display scaling (recommended — otherwise the borderless window is shrunk then blur-stretched by Windows, and Width/Height=-1 detects a wrong resolution) | 0: leave DPI virtualization on
ForceWindowedMode = 1                          // activates forced windowed mode (fixes Alt+Tab freeze)
EnableHooks = 0                                // needed for DoNotNotifyOnTaskSwitch, might need for CaptureMouse

[FORCEWINDOWED]
UsePrimaryMonitor = 0                          // move window to primary monitor
CenterWindow = 1                               // center window on screen
AlwaysOnTop = 0                                // window stays always on top
DoNotNotifyOnTaskSwitch = 1                    // 1: swallow WM_ACTIVATEAPP(FALSE) so HP5 doesn't react to focus loss and freeze on Alt+Tab. Works without EnableHooks: ForceWindowed subclasses the game's wndproc directly.
ForceWindowStyle = 1                           // 0: no change | 1: borderless fullscreen | 2: window | 3: resizable window | 4: no style
CaptureMouse = 0                               // capture mouse to window
FreeMouse = 1                                  // 1: prevent the game from clipping cursor / capturing exclusive input (lets you move to other monitors, take screenshots, press Win key) | 0: leave game's cursor handling alone

[LAUNCHER]
AppExe =
AppArgs =

[GRAPHICS]
Antialiasing = 8                               // 0: off | 2/4/8/16: MSAA on back buffer. Cascades down (16->8->4->2->NONE) until driver supports it. Ignored if SSAAFactor > 1. Disable if you observe artifacts on character rendering.
FXAA = 1                                       // 0: off | 1: on (post-process AA + adaptive sharpening applied to final frame, near-zero perf cost). Required for ColorGrading to apply.
Sharpness = 0.40                               // 0.0..1.0 — strength of the FXAA pass's adaptive sharpening. 0 = pure AA, no sharpening (use if you see a faint moving fringe on edges). 0.40 = default (crisp). Overshoot is clamped so it can't paint a 1px edge halo. Requires FXAA = 1.
AnisotropicFiltering = 16                      // 0: off | 2/4/8/16: AF level. Forces full trilinear+anisotropic pipeline for all textures.
VSync = 0                                      // 0: off | 1: on (forces D3DPRESENT_INTERVAL_ONE)
TextureLODBias = -1.0                          // 0: game default | negative = sharper textures at distance (recommended -1.0, going more negative may cause shimmer at very long range) | range: -3.0 to 0.0
SSAAFactor = 1                                 // 1: off | 2/3/4: render at NxN higher resolution then downsample (very expensive, disables MSAA when > 1). Best AA option if your GPU can handle it.
ShadowMapScale = 1                             // 1: off | 2/4: render the game's square shadow maps at NxN resolution for sharper shadow edges. EXPERIMENTAL — the game reuses the same surface type for reflections/projected effects, which this also upscales; if you see wrong reflections or artifacts, set back to 1.

// ---- Color grading (applied inside the FXAA pass — requires FXAA = 1) ----
ColorGrading = 1                               // 0: bypass all grading (neutral pass-through) | 1: apply the values below. Defaults are tuned to give HP5's flat 2007 look a subtle modern pop.
Vibrance = 0.25                                // 0.0..1.0 — boosts saturation of low-saturation pixels (skin, walls) without crushing already-colorful pixels. 0 = off.
Vignette = 0.00                                // 0.0..1.0 — radial darkening at screen corners (cinematic focus). 0 = off (default), 1 = corners go black.
Lift     = 0.00                                // -0.10..+0.10 — raises shadows. Positive value = lifted blacks (faded look). 0 = unchanged.
Gamma    = 1.00                                // 0.5..2.0 — midtone contrast curve. <1 brightens midtones, >1 darkens them. 1 = unchanged.
Gain     = 1.05                                // 0.5..2.0 — overall multiplier before gamma. >1 = brighter & punchier. 1 = unchanged.
Temperature = 0.00                             // -1.0..+1.0 — white balance. Negative = cooler (bluer), positive = warmer (more orange). 0 = neutral. Luma-preserving (only re-tints).
Tint     = 0.00                                // -1.0..+1.0 — white balance. Negative = greener, positive = magenta. 0 = neutral.
Contrast = 0.00                                // 0.0..1.0 — S-curve contrast. Deepens shadows and lifts highlights around mid-grey (adds "pop"/depth to flat scenes). 0 = off.
SplitTone = 0.00                               // 0.0..1.0 — cinematic split toning: cool/teal shadows + warm/orange highlights. 0 = off, 0.3-0.5 = tasteful. Midtones stay neutral.

// ---- Screen-space ambient occlusion (requires INTZ-capable GPU + FXAA = 1) ----
SSAO         = 0                               // 0: off | 1: on. Forces auto depth-stencil to INTZ format so we can sample it; falls back silently if unsupported. 12-tap spiral kernel (per-pixel rotated) inside the FXAA pass.
SSAOStrength = 0.80                            // 0.0..1.0 — how much occlusion darkens occluded pixels. 0.5 = moderate, 1.0 = aggressive (can over-darken).
SSAORadius   = 6.0                             // 1..16 pixels — radius of the outermost spiral tap (inner taps cover the disk). Larger = softer/wider AO halo, smaller = tight contact AO.
SSAOMinDelta = 0.001                           // perspective-relative threshold; samples with depth-delta below (MinDelta * (1-zC)) are skipped to avoid self-occlusion noise.
SSAOMaxDelta = 0.30                            // perspective-relative threshold; samples with depth-delta above (MaxDelta * (1-zC)) are skipped to avoid halos at silhouettes. Tighten if halos around characters.

// ---- Lighting pass: bloom + god rays (requires FXAA = 1; runs at half resolution) ----
Bloom          = 0                             // 0: off | 1: on. Soft glow around bright areas (windows, lamps, spells). Bright-pass + two-iteration Gaussian blur, composited additively.
BloomStrength  = 0.35                          // 0.0..2.0 — how strongly the blurred glow is added. 0.35 = subtle (default), 0.8 = strong. High values blow out bright menus.
BloomThreshold = 0.75                          // 0.0..1.0 — luma above which a pixel glows (shared with GodRays). Higher = only the brightest sources (keeps bright menus/UI from washing out).
GodRays        = 0                             // 0: off | 1: on. Crepuscular light shafts radiating from the brightest source ON SCREEN (auto-detected each frame). Best with a window/the sun visible; no source on screen = no rays.
GodRaysStrength= 0.45                          // 0.0..2.0 — how strongly the shafts are added. 0.45 = subtle (default), 1.0 = dramatic.
GodRaysDecay   = 0.96                          // 0.80..0.999 — per-step falloff along each ray. Higher = longer reaching shafts, lower = short stubs near the source.

[RESOLUTION]
// RECOMMENDED: leave these at 0 and pick your resolution in the GAME's own options menu.
// With DPIAware=1 the menu exposes your real native modes (e.g. 1440p). Setting it there keeps
// the game's internal projection in sync with the back buffer.
// Forcing a resolution here that differs from the game's own setting (especially -1 native, or a
// different aspect ratio) can desync the game's reflection rendering and produce translucent
// "ghost duplicate" artifacts on characters. Use a fixed value only if it matches the aspect the
// game is set to, or leave 0.
Width = 0                                      // 0: use the game's own resolution (recommended — set it in the in-game options) | -1: force monitor native (advanced, may ghost) | e.g. 1920
Height = 0                                     // 0: use the game's own resolution (recommended) | -1: force monitor native (advanced, may ghost) | e.g. 1080

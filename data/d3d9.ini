[MAIN]
FPSLimit = 0                                   // max fps (0: unlimited/off)
FPSLimitMode = 2                               // 1: realtime (thread-lock) | 2: accurate (sleep-yield)
FullScreenRefreshRateInHz = 0                  // overrides refresh rate selected by directx
DisplayFPSCounter = 0                          // displays fps and frametime on screen
ForceWindowedMode = 1                          // activates forced windowed mode (fixes Alt+Tab freeze)
EnableHooks = 0                                // needed for DoNotNotifyOnTaskSwitch, might need for CaptureMouse

[FORCEWINDOWED]
UsePrimaryMonitor = 0                          // move window to primary monitor
CenterWindow = 1                               // center window on screen
AlwaysOnTop = 0                                // window stays always on top
DoNotNotifyOnTaskSwitch = 0                    // game ignores focus loss (requires EnableHooks = 1)
ForceWindowStyle = 1                           // 0: no change | 1: borderless fullscreen | 2: window | 3: resizable window | 4: no style
CaptureMouse = 0                               // capture mouse to window
FreeMouse = 1                                  // 1: prevent the game from clipping cursor / capturing exclusive input (lets you move to other monitors, take screenshots, press Win key) | 0: leave game's cursor handling alone

[LAUNCHER]
AppExe =
AppArgs =

[GRAPHICS]
Antialiasing = 0                               // 0: off | 2: 2x MSAA | 4: 4x MSAA | 8: 8x MSAA | 16: 16x MSAA (auto-falls back if unsupported, ignored if SSAAFactor > 1). MSAA may interact badly with the game's render targets — prefer FXAA or SSAA.
FXAA = 1                                       // 0: off | 1: on (post-process AA + adaptive sharpening applied to final frame, near-zero perf cost)
AnisotropicFiltering = 16                      // 0: off | 2/4/8/16: AF level. Forces full trilinear+anisotropic pipeline for all textures.
VSync = 0                                      // 0: off | 1: on (forces D3DPRESENT_INTERVAL_ONE)
TextureLODBias = -1.0                          // 0: game default | negative = sharper textures at distance (recommended -1.0, going more negative may cause shimmer at very long range) | range: -3.0 to 0.0
SSAAFactor = 1                                 // 1: off | 2/3/4: render at NxN higher resolution then downsample (very expensive, disables MSAA when > 1). Best AA option if your GPU can handle it.

[RESOLUTION]
Width = 0                                      // 0: use game default | e.g. 1920
Height = 0                                     // 0: use game default | e.g. 1080
